start_date: "2020-01-01"
end_date: "2021-12-31"
initial_capital: 1000000

data:
  price_provider: "mock"  # mock or yfinance
  fundamental_provider: "csv"
  metadata_provider: "local"
  cache_enabled: true
  fundamentals_path: "data/fundamentals_sample.csv"
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - JPM
    - BAC
    - XOM
    - CVX
    - PFE
    - MRK
    - HD
    - NKE
    - CAT
    - GE
    - PG
    - KO
    - COST
    - WMT
    - UNH
  benchmark: "SPY"

universe:
  min_price: 5
  min_avg_dollar_volume_20d: 10000000
  min_market_cap: 1000000000
  min_history_days: 252
  allowed_security_type: "Common Stock"

factors:
  winsor_lower: 0.01
  winsor_upper: 0.99
  max_missing_subfactors: 2
  weights:
    momentum_score: 0.30
    quality_score: 0.25
    value_score: 0.25
    low_vol_score: 0.20

portfolio:
  top_n: 50
  max_stock_weight: 0.025
  max_sector_weight: 0.25
  current_positions_source: "csv"
  current_positions_path: "data/current_positions.csv"
  portfolio_value: 100000

costs:
  commission_rate: 0.001
  slippage_rate: 0.001

decision_output:
  enabled: true
  as_of_date: "latest"
  include_explanations: true
  include_order_preview: true

orders:
  generate_preview: true
  allow_fractional_shares: false
  min_weight_change: 0.0025
  min_trade_notional: 100

paper_trading:
  dry_run: true
  execute: false
  cash_buffer: 0.02
  min_notional: 1.0
